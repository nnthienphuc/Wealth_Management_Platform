<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Portfolio Tracker</title>
    <style>
      /* CSS cho vòng xoay loading */
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .loader-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #0f172a; /* Màu nền giống Landing Page */
        font-family: sans-serif;
      }
      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(249, 168, 212, 0.2); /* Viền mờ */
        border-top-color: #ec4899; /* Viền hồng pink-500 */
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      .loading-text {
        color: #f9a8d4;
        font-size: 1.2rem;
        font-weight: bold;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loader-container">
        <div class="spinner"></div>
        <div class="loading-text">Loading Portfolio Tracker...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
